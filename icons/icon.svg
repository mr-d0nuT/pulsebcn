## PASO 3 — Activar GitHub Pages

Una vez tengas todos los archivos:

1. Ve a tu repo → pestaña **Settings** (arriba)
2. En el menú izquierdo busca **Pages**
3. En "Source" selecciona **GitHub Actions**
4. Guarda

