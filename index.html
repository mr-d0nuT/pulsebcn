<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#e94560"/>
  <title>PulseBCN — Esdeveniments d'avui</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<header id="app-header">
  <div class="header-left">
    <span class="logo">⚡ PulseBCN</span>
    <span id="event-count" class="badge">…</span>
  </div>
  <div class="header-right">
    <button id="btn-locate" title="La meva ubicació">📍</button>
    <button id="btn-refresh" title="Actualitzar">🔄</button>
  </div>
</header>
<div id="filter-bar">
  <input type="date" id="date-picker" title="Seleccionar data"/>
  <button class="filter-btn active" data-filter="all">Tots</button>
  <button class="filter-btn" data-filter="free">🆓 Gratuïts</button>
  <button class="filter-btn" data-filter="family">👨‍👩‍👧 Família</button>
  <button class="filter-btn" data-filter="cultura">🎭 Cultura</button>
  <button class="filter-btn" data-filter="musica">🎵 Música</button>
  <button class="filter-btn" data-filter="esport">⚽ Esport</button>
  <button class="filter-btn" data-filter="cinema">🎬 Cinema</button>
  <button class="filter-btn" data-filter="exposicio">🖼️ Exposicions</button>
  <button class="filter-btn" data-filter="familia">👶 Infantil</button>
  <button class="filter-btn" data-filter="menjar">🍽️ Mercat</button>
</div>
<div id="map"></div>
<div id="event-panel" class="panel hidden">
  <div class="panel-handle"></div>
  <div id="panel-content"></div>
</div>
<button id="btn-list-toggle" class="fab">≡</button>
<div id="event-list" class="hidden">
  <div class="list-header">
    <span>Llista d'esdeveniments</span>
    <button id="btn-list-close">✕</button>
  </div>
  <div id="list-items"></div>
</div>
<div id="ar-overlay" class="hidden">
  <video id="ar-video" autoplay playsinline muted></video>
  <canvas id="ar-canvas"></canvas>
  <div id="ar-hud">
    <div id="ar-compass"></div>
    <div id="ar-info"></div>
  </div>
  <button id="ar-close">✕ Tancar AR</button>
</div>
<div id="review-modal" class="modal hidden">
  <div class="modal-box">
    <h3>💬 Deixa la teva ressenya</h3>
    <input type="text" id="review-user" placeholder="El teu nom o apodo" maxlength="50"/>
    <div id="star-rating">
      <span class="star" data-v="1">★</span>
      <span class="star" data-v="2">★</span>
      <span class="star" data-v="3">★</span>
      <span class="star" data-v="4">★</span>
      <span class="star" data-v="5">★</span>
    </div>
    <textarea id="review-text" placeholder="Com ha estat? Deixa un comentari..." maxlength="500"></textarea>
    <label class="photo-label">
      📷 Afegir foto
      <input type="file" id="review-photo" accept="image/*" capture="environment"/>
    </label>
    <div id="photo-preview"></div>
    <div class="modal-actions">
      <button id="review-cancel">Cancel·lar</button>
      <button id="review-submit" class="btn-primary">Publicar</button>
    </div>
  </div>
</div>
<div id="toast" class="hidden"></div>
<div id="loading-overlay">
  <div class="pulse-loader"><div></div><div></div><div></div></div>
  <p>Carregant el pols de Barcelona…</p>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="ar.js"></script>
<script src="app.js"></script>
</body>
</html>
